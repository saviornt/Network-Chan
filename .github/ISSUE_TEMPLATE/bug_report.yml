name: 🐛 Bug Report
description: Report a defect or unexpected behaviour in any component.
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please provide as much detail as possible. Bugs must be reproduced before being scheduled into a sprint.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      multiple: true
      options:
        - "appliance/ (Raspberry Pi 5 edge controller)"
        - "assistant/ (PC / AIOps server)"
        - "shared/ (shared utilities)"
        - "CI/CD (.github/)"
        - "scripts/"
        - "docs/"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "🔴 Critical – data loss, security vulnerability, or system crash"
        - "🟠 High – major feature broken, no workaround"
        - "🟡 Medium – feature partially broken, workaround exists"
        - "🟢 Low – cosmetic or minor inconvenience"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start the appliance with `python src/main.py`
        2. Observe telemetry ingestor
        3. Notice that …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Raspberry Pi OS 64-bit / Ubuntu 24.04
        - Python: 3.12.x
        - Branch / commit: main @ abc1234
        - Hardware: Pi 5 / PC
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Stack Trace
      render: text
      description: Paste any relevant log output or stack traces here.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, related issues, or suggested fixes.
