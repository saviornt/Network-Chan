name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Validate tag format ─────────────────────────────────────────────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

  # ─── Build appliance package ─────────────────────────────────────────────
  build-appliance:
    name: Build / appliance
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tools
        run: pip install build wheel

      - name: Create appliance distribution archive
        run: |
          tar -czf network-chan-appliance-${{ needs.validate.outputs.version }}.tar.gz \
            appliance/ shared/ scripts/ \
            --exclude="**/__pycache__" \
            --exclude="**/*.pyc" \
            --exclude="**/.venv" \
            --exclude="**/tests"

      - name: Upload appliance artifact
        uses: actions/upload-artifact@v4
        with:
          name: appliance-dist
          path: network-chan-appliance-*.tar.gz

  # ─── Build assistant package ──────────────────────────────────────────────
  build-assistant:
    name: Build / assistant
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tools
        run: pip install build wheel

      - name: Create assistant distribution archive
        run: |
          tar -czf network-chan-assistant-${{ needs.validate.outputs.version }}.tar.gz \
            assistant/ shared/ scripts/ \
            --exclude="**/__pycache__" \
            --exclude="**/*.pyc" \
            --exclude="**/.venv" \
            --exclude="**/tests"

      - name: Upload assistant artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant-dist
          path: network-chan-assistant-*.tar.gz

  # ─── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-appliance, build-assistant]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Network-Chan ${{ github.ref_name }}"
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}

            ## Components
            | Component | Archive |
            |-----------|---------|
            | Appliance (Raspberry Pi 5) | `network-chan-appliance-${{ needs.validate.outputs.version }}.tar.gz` |
            | Assistant (PC / Server) | `network-chan-assistant-${{ needs.validate.outputs.version }}.tar.gz` |

            ## Deployment
            See [docs/release_deployment.md](docs/release_deployment.md) for full deployment instructions.

            ## Sprint Notes
            See [docs/sprint_plan.md](docs/sprint_plan.md) for the sprint associated with this release.
          files: |
            network-chan-appliance-*.tar.gz
            network-chan-assistant-*.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
