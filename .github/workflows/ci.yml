name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install shared dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ./shared[dev]

      - name: Lint with ruff & black
        run: |
          ruff check shared/ appliance/
          black --check shared/ appliance/

      - name: Type check with mypy
        run: |
          mypy shared/ appliance/ --strict --install-types --non-interactive

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
        package: ['shared', 'appliance']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ./${{ matrix.package }}[dev]

      - name: Run pytest
        run: |
          pytest ./${{ matrix.package }} --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # Add secret later if using Codecov
          fail_ci_if_error: false
