name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "sprint/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict all jobs to read-only by default; individual jobs override as needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Lint & Type-check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff – format check
        run: ruff format --check .

      - name: Ruff – lint
        run: ruff check .

      - name: MyPy – type-check (shared)
        run: |
          pip install pydantic pydantic-settings types-pyyaml
          mypy shared/src --ignore-missing-imports

      - name: MyPy – type-check (appliance)
        run: mypy appliance/src --ignore-missing-imports

  # ─── Test: shared ────────────────────────────────────────────────────────
  test-shared:
    name: Test / shared
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install shared dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r shared/requirements.txt

      - name: Create test env file
        run: |
          cp .env.example shared/tests/.env.test

      - name: Run shared tests
        working-directory: shared
        env:
          PYTHONPATH: "${{ github.workspace }}/shared:${{ github.workspace }}"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml:../coverage-shared.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage (shared)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: coverage-shared.xml

  # ─── Test: appliance ─────────────────────────────────────────────────────
  test-appliance:
    name: Test / appliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install appliance dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r appliance/requirements.txt

      - name: Create test env file
        run: |
          cp .env.example appliance/tests/.env.test

      - name: Run appliance tests
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          pytest appliance/tests/ \
            --cov=appliance/src \
            --cov-report=xml:coverage-appliance.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage (appliance)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-appliance
          path: coverage-appliance.xml

  # ─── Test: assistant ─────────────────────────────────────────────────────
  test-assistant:
    name: Test / assistant
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install assistant dependencies
        run: |
          pip install -r requirements-dev.txt
          # Install CPU-only FAISS instead of the GPU variant listed in requirements.txt
          grep -v "faiss-gpu" assistant/requirements.txt | pip install -r /dev/stdin
          pip install faiss-cpu

      - name: Create test env file
        run: |
          cp .env.example assistant/tests/.env.test 2>/dev/null || true

      - name: Run assistant tests
        env:
          PYTHONPATH: "${{ github.workspace }}"
        run: |
          if [ -d "assistant/tests" ] && [ "$(ls -A assistant/tests/*.py 2>/dev/null)" ]; then
            pytest assistant/tests/ \
              --cov=assistant/src \
              --cov-report=xml:coverage-assistant.xml \
              --cov-report=term-missing \
              -v
          else
            echo "No assistant tests found yet – skipping"
          fi

      - name: Upload coverage (assistant)
        if: hashFiles('coverage-assistant.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-assistant
          path: coverage-assistant.xml

  # ─── Coverage Gate ───────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-shared, test-appliance, test-assistant]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install coverage tool
        run: pip install coverage[toml]

      - name: Merge and display coverage
        run: |
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          for f in coverage-*.xml; do
            echo "#### $f" >> $GITHUB_STEP_SUMMARY
            python -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('$f')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Line coverage: {pct:.1f}%')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not parse $f" >> $GITHUB_STEP_SUMMARY
          done
