name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install shared dev deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ./shared[dev]

      - name: Create mypy cache
        run: mkdir -p .mypy_cache

      - name: Lint with ruff
        run: |
          ruff check shared/ appliance/ assistant/

      - name: Type check with mypy
        run: |
          mypy shared/ appliance/ assistant/ --strict --cache-dir .mypy_cache

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        package: ["shared", "appliance", "assistant"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ./${{ matrix.package }}[dev]

      - name: Run tests with coverage
        run: |
          pytest ./${{ matrix.package }} --cov=./${{ matrix.package }} --cov-report=term-missing --cov-report=xml

      # Uncomment if/when you add Codecov
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     file: coverage.xml
