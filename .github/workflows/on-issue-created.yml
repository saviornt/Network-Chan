name: Auto-process new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign and label new issue
        uses: actions/github-script@v7
        env:
          ASSIGNEE: saviornt # GitHub username to auto-assign
          DEFAULT_LABELS: needs-triage,task
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = context.repo;

            // 1. Auto-assign
            await github.rest.issues.addAssignees({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              assignees: [process.env.ASSIGNEE]
            });

            // 2. Add labels (split the env string)
            const labels = process.env.DEFAULT_LABELS.split(',').map(l => l.trim());
            await github.rest.issues.addLabels({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              labels: labels
            });

            console.log(`Processed issue #${issueNumber}`);
