[tool.ruff]
target-version = "py312"
line-length = 88
extend-select = ["I"]          # isort rules
extend-ignore = ["E501"]       # line too long (optional)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.ruff.lint]
preview = true
select = ["E", "F", "I", "UP", "B", "Q", "ANN"]
ignore = [
    "UP035",  # non-pep604-annotation-optional: prefer Optional[T] over T | None
    "UP006",
]

[tool.mypy]
python_version = "3.12"           # or your version
strict = true                     # optional but recommended
explicit_package_bases = true
mypy_path = [
    "appliance/src",
    "assistant/src",        # add this when the folder exists
    "shared/src",
]
plugins = [
    "pydantic.mypy",
]

# Optional: reduce noise while debugging
warn_unused_ignores = false
warn_redundant_casts = false
show_error_codes = true

disallow_untyped_defs = false