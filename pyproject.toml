[tool.ruff]
target-version = "py312"
line-length = 88
extend-select = ["I"]          # isort rules
extend-ignore = ["E501"]       # line too long (optional)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.ruff.lint]
preview = true
select = ["E", "F", "I", "UP", "B", "Q", "ANN"]