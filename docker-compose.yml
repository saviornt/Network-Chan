# Network-Chan/docker-compose.yml (root level)
# Central compose file for the monorepo – start here for appliance development

services:
  appliance:
    build:
      context: . # repo root – allows COPY shared/ and appliance/
      dockerfile: appliance/Dockerfile
    image: network-chan-appliance:base
    container_name: network-chan-appliance
    restart: unless-stopped
    platform: linux/arm64 # for Pi 5 compatibility + emulation
    ports:
      - "8001:8001" # minimal FastAPI config/status page
    # ────────────────────────────────────────────────────────────────
    # PRODUCTION-LIKE MODE (recommended for testing realism)
    # ────────────────────────────────────────────────────────────────
    # No volumes mounted → mimics real Pi install (code comes from pip git)
    # volumes: []  # ← uncomment this block when you want pure production sim

    # ────────────────────────────────────────────────────────────────
    # DEVELOPMENT MODE volumes (comment out for prod-like runs)
    # ────────────────────────────────────────────────────────────────
    # volumes:
    # Mount source code directly into expected locations
    # - ./appliance/src:/app
    # - ./shared/src:/app/shared
    environment:
      APP_ENV: development
      AUTONOMOUS_MODE: advisor # start safe
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4.0
    tty: true
    stdin_open: true
    # healthcheck:                     # TODO: add once /health endpoint exists
    #   test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
